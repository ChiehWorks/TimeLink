<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>時刻通 - 任務管理</title>
    <!-- 載入 LINE 原生 LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            color: #333;
            overflow-x: hidden;
        }

        /* 呼吸燈載入畫面 */
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .fade-out {
            opacity: 0;
            pointer-events: none;
        }
        .breathing-logo {
            width: 100px;
            height: 100px;
            border-radius: 22px;
            animation: breath 2s ease-in-out infinite; 
        }
        @keyframes breath {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }
        .loading-text {
            margin-top: 20px;
            color: #333;
            font-weight: bold;
            letter-spacing: 2px;
            animation: pulseText 2s infinite;
        }
        @keyframes pulseText {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* 主畫面容器 */
        .container {
            padding: 20px;
            padding-bottom: 80px;
        }
        .header {
            text-align: center;
            color: #06C755;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        /* 任務清單卡片 (全新優化排版) */
        #taskList {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .task-card {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            position: relative;
        }
        
        /* 1. 任務內容升級為主標題 */
        .task-content-title {
            font-size: 18px;
            font-weight: bold;
            color: #111;
            line-height: 1.4;
            margin-bottom: 12px;
            word-break: break-all;
        }
        
        /* 2. 時間與屬性降級為膠囊資訊 */
        .task-meta {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }
        .meta-item {
            display: flex;
            align-items: center;
            background-color: #f5f6f8;
            color: #555;
            font-size: 13px;
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: 500;
        }
        .task-badge {
            display: inline-block;
            background-color: #e6f8ec;
            color: #06C755;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: bold;
        }

        /* 操作按鈕 */
        .task-actions {
            display: flex;
            gap: 10px;
            border-top: 1px dashed #eaeaea;
            padding-top: 14px;
        }
        .btn-edit, .btn-delete {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            border: none;
        }
        .btn-edit {
            background-color: #f0f0f0;
            color: #333;
        }
        .btn-delete {
            background-color: #ffecec;
            color: #e53935;
        }
        .empty-state {
            text-align: center;
            color: #888;
            padding: 40px 0;
            font-size: 15px;
        }

        /* 編輯彈窗 (Modal) */
        #editModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        #editModal.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background: #fff;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 20px 20px 0 0;
            padding: 24px;
            box-sizing: border-box;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #editModal.active .modal-content {
            transform: translateY(0);
        }
        
        /* 表單樣式重用 */
        .form-group { margin-bottom: 16px; }
        label { display: block; font-weight: bold; margin-bottom: 6px; font-size: 14px; color: #555; }
        input[type="time"], input[type="date"], select, textarea {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;
            box-sizing: border-box; font-size: 16px; background-color: #fafafa;
        }
        textarea { resize: vertical; height: 80px; }
        .hidden { display: none !important; }
        .btn-save { width: 100%; padding: 14px; background-color: #06C755; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 10px;}
        .btn-cancel { width: 100%; padding: 14px; background-color: transparent; color: #888; border: none; font-size: 15px; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <img src="logo.png" alt="時刻通 Logo" class="breathing-logo">
        <div class="loading-text" id="loadingStatus">連線授權中...</div>
    </div>

    <div class="container">
        <div class="header">我的提醒任務</div>
        <div id="taskList">
            <!-- 任務卡片動態塞入 -->
        </div>
    </div>

    <div id="editModal">
        <div class="modal-content">
            <h3 style="margin-top: 0; color: #333; text-align: center;">編輯任務</h3>
            <form id="editForm">
                <input type="hidden" id="editTaskId">
                
                <div class="form-group">
                    <label>提醒時間</label>
                    <input type="time" id="editTime" required>
                </div>
                
                <div class="form-group">
                    <label>重複週期</label>
                    <select id="editCycle" required>
                        <option value="單次">單次 (僅提醒一天)</option>
                        <option value="每天">每天 (含假日)</option>
                        <option value="上班日">上班日 (週一至週五)</option>
                    </select>
                </div>
                
                <div class="form-group" id="editDateGroup">
                    <label>提醒日期</label>
                    <input type="date" id="editDate">
                </div>
                
                <div class="form-group">
                    <label>提醒內容</label>
                    <textarea id="editContent" required></textarea>
                </div>
                
                <button type="submit" class="btn-save" id="btnSave">儲存變更</button>
                <button type="button" class="btn-cancel" onclick="closeModal()">取消</button>
            </form>
        </div>
    </div>

    <script>
        const LIFF_ID = "2010547461-Yeb2WkyQ"; 
        
        const BASE_WEBHOOK_URL = "https://chiehworks-n8n.zeabur.app/webhook";
        const API_GET_TASKS = `${BASE_WEBHOOK_URL}/liff-get-tasks`;
        const API_UPDATE_TASK = `${BASE_WEBHOOK_URL}/liff-update-task`;
        const API_DELETE_TASK = `${BASE_WEBHOOK_URL}/liff-delete-task`;
        
        let userLineId = "";
        let currentTasks = []; 

        document.getElementById('editCycle').addEventListener('change', function() {
            const dateGroup = document.getElementById('editDateGroup');
            const targetDate = document.getElementById('editDate');
            if (this.value === '單次') {
                dateGroup.classList.remove('hidden');
                targetDate.required = true;
            } else {
                dateGroup.classList.add('hidden');
                targetDate.required = false;
            }
        });

        async function initializeLiff() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    userLineId = profile.userId;
                    document.getElementById('loadingStatus').innerText = "獲取任務資料中...";
                    await fetchTasks();
                }
            } catch (err) {
                document.getElementById('loadingStatus').innerText = "系統初始化失敗";
                alert("LIFF 載入失敗，請確認網路狀態。");
            }
        }

        async function fetchTasks() {
            try {
                const response = await fetch(`${API_GET_TASKS}?lineId=${userLineId}`);
                if (response.ok) {
                    currentTasks = await response.json();
                    renderTasks();
                    document.getElementById('loadingScreen').classList.add('fade-out');
                } else {
                    throw new Error("API 回應異常");
                }
            } catch (err) {
                alert("無法取得任務資料，請稍後再試。");
            }
        }

        // --- 全新渲染邏輯 ---
        function renderTasks() {
            const listContainer = document.getElementById('taskList');
            listContainer.innerHTML = ''; 

            if (currentTasks.length === 0) {
                listContainer.innerHTML = '<div class="empty-state">您目前沒有任何排程任務喔！</div>';
                return;
            }

            currentTasks.forEach(task => {
                const isSingle = task.Cycle_Type === '單次';
                const dateDisplay = isSingle && task.Target_Date ? `<span class="meta-item">📅 ${task.Target_Date}</span>` : '';
                
                const cardHtml = `
                    <div class="task-card" id="task-${task.Id}">
                        <div class="task-content-title">${task.Message_Content}</div>
                        <div class="task-meta">
                            <span class="meta-item">⏰ ${task.Target_Time}</span>
                            ${dateDisplay}
                            <span class="task-badge">${task.Cycle_Type}</span>
                        </div>
                        <div class="task-actions">
                            <button class="btn-edit" onclick="openEditModal(${task.Id})">✎ 編輯</button>
                            <button class="btn-delete" onclick="deleteTask(${task.Id})">🗑️ 刪除</button>
                        </div>
                    </div>
                `;
                listContainer.insertAdjacentHTML('beforeend', cardHtml);
            });
        }

        async function deleteTask(taskId) {
            if (!confirm("確定要刪除這個提醒任務嗎？")) return;
            
            const card = document.getElementById(`task-${taskId}`);
            card.style.opacity = '0.5';

            try {
                const response = await fetch(API_DELETE_TASK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ taskId: taskId, Line_ID: userLineId })
                });

                if (response.ok) {
                    currentTasks = currentTasks.filter(t => t.Id !== taskId);
                    renderTasks();
                } else {
                    card.style.opacity = '1';
                    alert("刪除失敗，請稍後再試。");
                }
            } catch (err) {
                card.style.opacity = '1';
                alert("網路異常，刪除失敗。");
            }
        }

        function openEditModal(taskId) {
            const task = currentTasks.find(t => t.Id === taskId);
            if (!task) return;

            document.getElementById('editTaskId').value = task.Id;
            document.getElementById('editTime').value = task.Target_Time;
            document.getElementById('editCycle').value = task.Cycle_Type;
            document.getElementById('editContent').value = task.Message_Content;
            
            const dateGroup = document.getElementById('editDateGroup');
            const dateInput = document.getElementById('editDate');
            if (task.Cycle_Type === '單次') {
                dateGroup.classList.remove('hidden');
                dateInput.required = true;
                dateInput.value = task.Target_Date || '';
            } else {
                dateGroup.classList.add('hidden');
                dateInput.required = false;
                dateInput.value = '';
            }

            document.getElementById('editModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        document.getElementById('editForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btnSave = document.getElementById('btnSave');
            btnSave.disabled = true;
            btnSave.innerText = "儲存中...";

            const payload = {
                taskId: document.getElementById('editTaskId').value,
                Line_ID: userLineId, 
                Target_Time: document.getElementById('editTime').value,
                Cycle_Type: document.getElementById('editCycle').value,
                Target_Date: document.getElementById('editDate').value || null,
                Message_Content: document.getElementById('editContent').value
            };

            try {
                const response = await fetch(API_UPDATE_TASK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert("更新成功！");
                    closeModal();
                    await fetchTasks();
                } else {
                    alert("更新失敗，請稍後再試。");
                }
            } catch (err) {
                alert("網路異常，請確認連線狀態。");
            } finally {
                btnSave.disabled = false;
                btnSave.innerText = "儲存變更";
            }
        });

        initializeLiff();
    </script>
</body>
</html>
